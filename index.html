<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio</title>
  <meta name="description" content="" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Vanta.js Waves Background -->
  <div id="vanta-bg"></div>

  <!-- Navigation -->
  <nav class="navbar" id="navbar">
    <div class="nav-container">
      <a href="#" class="nav-logo" id="navLogo"></a>
      <button class="nav-toggle" id="navToggle" aria-label="Toggle navigation">
        <span></span><span></span><span></span>
      </button>
      <ul class="nav-links" id="navLinks">
        <li><a href="#about">About</a></li>
        <li><a href="#experience">Experience</a></li>
        <li><a href="#projects">Projects</a></li>
        <li><a href="#skills">Skills</a></li>
        <li><a href="#education">Education</a></li>
        <li><a href="#contact">Contact</a></li>
      </ul>
    </div>
  </nav>

  <!-- Hero -->
  <section class="hero" id="hero">
    <div class="hero-bg-grid"></div>
    <div class="hero-content">
      <p class="hero-greeting" id="heroGreeting"></p>
      <h1 class="hero-name" id="heroName"></h1>
      <h2 class="hero-title">
        <span class="typed-text" id="typedText"></span><span class="cursor">|</span>
      </h2>
      <p class="hero-description" id="heroDescription"></p>
      <div class="hero-cta">
        <a href="#contact" class="btn btn-primary" id="heroCTAPrimary"></a>
        <a href="#projects" class="btn btn-outline" id="heroCTASecondary"></a>
      </div>
      <div class="hero-social" id="heroSocial"></div>
    </div>
    <div class="scroll-indicator">
      <span>Scroll</span>
      <div class="scroll-line"></div>
    </div>
  </section>

  <!-- About -->
  <section class="section" id="about">
    <div class="vanta-section-bg" id="vanta-about"></div>
    <div class="container">
      <h2 class="section-title">About Me</h2>
      <div class="about-grid">
        <div class="about-text" id="aboutText"></div>
        <div class="about-stats" id="aboutStats"></div>
      </div>
    </div>
  </section>

  <!-- Experience -->
  <section class="section section-alt" id="experience">
    <div class="vanta-section-bg" id="vanta-experience"></div>
    <div class="container">
      <h2 class="section-title">Experience</h2>
      <div class="timeline" id="timeline"></div>
    </div>
  </section>

  <!-- Projects -->
  <section class="section" id="projects">
    <div class="vanta-section-bg" id="vanta-projects"></div>
    <div class="container">
      <h2 class="section-title">Featured Projects</h2>
      <div class="projects-grid" id="projectsGrid"></div>
    </div>
  </section>

  <!-- Skills -->
  <section class="section section-alt" id="skills">
    <div class="vanta-section-bg" id="vanta-skills"></div>
    <div class="container">
      <h2 class="section-title">Skills & Tools</h2>
      <div class="skills-grid" id="skillsGrid"></div>
    </div>
  </section>

  <!-- Education -->
  <section class="section" id="education">
    <div class="vanta-section-bg" id="vanta-education"></div>
    <div class="container">
      <h2 class="section-title">Education</h2>
      <div class="education-grid" id="educationGrid"></div>
      <h3 class="subsection-title">Certifications</h3>
      <div class="cert-list" id="certList"></div>
    </div>
  </section>

  <!-- Contact -->
  <section class="section section-alt" id="contact">
    <div class="vanta-section-bg" id="vanta-contact"></div>
    <div class="container">
      <h2 class="section-title" id="contactHeading"></h2>
      <div class="contact-content">
        <p class="contact-text" id="contactText"></p>
        <div class="contact-cards" id="contactCards"></div>
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer class="footer">
    <div class="container">
      <p id="footerText"></p>
    </div>
  </footer>

  <!-- Vanta.js Dependencies -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.waves.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.net.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.dots.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.birds.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.globe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.rings.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.fog.min.js"></script>

  <!-- Modular Scripts -->
  <script src="js/vanta-bg.js"></script>
  <script src="js/data.js"></script>
  <script src="js/icons.js"></script>
  <script src="js/hero.js"></script>
  <script src="js/navbar.js"></script>
  <script src="js/about.js"></script>
  <script src="js/experience.js"></script>
  <script src="js/projects.js"></script>
  <script src="js/skills.js"></script>
  <script src="js/education.js"></script>
  <script src="js/contact.js"></script>
  <script src="js/animations.js"></script>
  <script src="js/mouse-effects.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
